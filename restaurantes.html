<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuales de Procesos R1 - Grupo Kase</title>
    <style>
        :root {
            --kase-azul: #2A5A7A;
            --kase-dorado: #F39C12;
            --bg-gris: #F4F7F6;
            --blanco: #ffffff;
            --texto-oscuro: #2C3E50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gris);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--kase-azul);
            color: var(--blanco);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--kase-dorado);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
        header p { margin: 10px 0 0; font-weight: bold; color: var(--kase-dorado); }

        .container {
            flex: 1;
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .list-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-header h2 { color: var(--kase-azul); margin: 0; font-size: 1.4rem; }

        .file-list { display: flex; flex-direction: column; gap: 12px; }
