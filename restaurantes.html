<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuales de Procesos R1 - Grupo Kase</title>
    <style>
        :root {
            --kase-azul: #2A5A7A;
            --kase-dorado: #F39C12;
            --bg-gris: #F4F7F6;
            --blanco: #ffffff;
            --texto-oscuro: #2C3E50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-gris);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--kase-azul);
            color: var(--blanco);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--kase-dorado);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 { margin: 0; font-size: 2rem; text-transform: uppercase; letter-spacing: 2px; }
        header p { margin: 10px 0 0; font-weight: bold; color: var(--kase-dorado); }

        .container {
            flex: 1;
            max-width: 900px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .list-header {
            border-bottom: 2px solid #eee;
            padding-bottom: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .list-header h2 { color: var(--kase-azul); margin: 0; font-size: 1.4rem; }

        .file-list { display: flex; flex-direction: column; gap: 12px; }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            border: 1px solid #e1e8ed;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .file-item:hover {
            border-color: var(--kase-dorado);
            background-color: #FFFCF5;
            transform: translateX(5px);
        }

        .file-info { display: flex; align-items: center; gap: 15px; }
        .file-icon { font-size: 28px; color: var(--kase-dorado); }
        .file-name { font-weight: 600; color: var(--texto-oscuro); font-size: 16px; }

        .btn-open {
            background-color: var(--kase-azul);
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-open:hover {
            background-color: var(--kase-dorado);
            color: var(--kase-azul);
        }

        .loader { text-align: center; padding: 40px; color: #7f8c8d; font-style: italic; }

        /* Footer Solicitado */
        footer {
            text-align: center;
            padding: 25px;
            font-size: 0.9rem;
            color: #7f8c8d;
            background-color: #eee;
            border-top: 1px solid #ddd;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <header>
        <h1>Manuales de Procesos R1</h1>
        <p>Grupo Kase - Soporte Restaurantes</p>
    </header>

    <div class="container">
        <div class="list-header">
            <h2>Guías Disponibles</h2>
            <span id="file-count" style="background:var(--kase-azul); color:white; padding:4px 12px; border-radius:15px; font-size:12px;">0 Archivos</span>
        </div>

        <div id="lista-manuales" class="file-list">
            <div class="loader">Escaneando guías de soporte...</div>
        </div>
    </div>

    <footer>
        Soporte IT | Grupo Kase © 2026
    </footer>

    <script>
        async function cargarManualesR1() {
            const container = document.getElementById('lista-manuales');
            const contador = document.getElementById('file-count');
            const urlCarpeta = `restaurantes/`;

            try {
                const respuesta = await fetch(urlCarpeta);
                const textoHtml = await respuesta.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(textoHtml, 'text/html');
                const enlaces = doc.querySelectorAll('a');

                let htmlFinal = '';
                let encontrados = 0;

                enlaces.forEach(link => {
                    const nombreArchivo = link.innerText;
                    if (nombreArchivo.toLowerCase().endsWith('.pdf') && !nombreArchivo.includes('Parent Directory')) {
                        encontrados++;
                        const nombreLimpio = nombreArchivo.replace('.pdf', '').replace(/_/g, ' ');
                        
                        htmlFinal += `
                            <div class="file-item">
                                <div class="file-info">
                                    <span class="file-icon">📄</span>
                                    <span class="file-name">${nombreLimpio}</span>
                                </div>
                                <a href="${urlCarpeta}${nombreArchivo}" target="_blank" class="btn-open">ABRIR MANUAL</a>
                            </div>
                        `;
                    }
                });

                container.innerHTML = encontrados > 0 ? htmlFinal : '<div class="loader">No se encontraron manuales en la carpeta de Restaurantes.</div>';
                contador.innerText = encontrados + ' Archivos';

            } catch (error) {
                container.innerHTML = '<div class="loader" style="color:red;">Error de conexión. Verifique el Directorio Virtual en IIS.</div>';
            }
        }

        window.onload = cargarManualesR1;
    </script>
</body>
</html>
